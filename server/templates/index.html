<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>BTC Auto Trading Dashboard</title>
    <link rel="stylesheet" href="/static/stylee.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="app">

        <!-- Header -->
        <header class="header">
            <h1>BTC Auto Trading</h1>
            <div class="connection">
                <span class="server on">Server: Connected</span>
                <span class="account on">Account: Linked</span>
            </div>
        </header>

        <!-- Account Summary -->
        <section class="account-summary">
            <div class="card">
                <span>KRW Balance</span>
                <strong id="krwBalance">₩0</strong>
            </div>
            <div class="card">
                <span>BTC Holding</span>
                <strong id="btcHolding">0 BTC</strong>
            </div>
            <div class="card">
                <span>Total Asset</span>
                <strong id="totalAsset">₩0</strong>
            </div>
        </section>

        <!-- Main -->
        <section class="main">

            <!-- Market -->
            <div class="market card">
                <h2>Market</h2>
                <div class="price" id="btcPrice">₩0</div>
                <!-- <div class="chart-placeholder">Chart Area</div> -->
                <div style="height: 200px; background: white; padding: 10px; border-radius: 6px;">
                    <canvas id="btcChart"></canvas>
                </div>
            </div>

            <!-- Control -->
            <div class="control">

                <!-- Auto Trading -->
                <div class="auto-control card">
                    <h2>Auto Trading</h2>
                    <label class="switch">
                        <input type="checkbox" id="autoToggle" />
                        <span id="autoStatusText">Auto Trading OFF</span>
                    </label>
                    <p class="warning">⚠ 실제 거래가 실행될 수 있습니다</p>
                </div>

                <!-- Strategy -->
                <div class="strategy card">
                    <h2>Strategy Settings</h2>

                    <label>
                        Buy Condition (%)
                        <input type="number" id="buyPercent" />
                    </label>

                    <label>
                        Sell Condition (%)
                        <input type="number" id="sellPercent" />
                    </label>

                    <label>
                        Order Amount (KRW)
                        <input type="number" id="orderAmount" />
                    </label>

                    <button class="save-btn">Save Strategy</button>
                </div>

            </div>
        </section>

        <!-- Trade History -->
        <section class="trade-history card">
            <h2>Trade History</h2>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Type</th>
                        <th>Price</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tradeTableBody"></tbody>
            </table>
        </section>

    </div>

    <script src="/static/script.js"></script>
</body>

</html>
